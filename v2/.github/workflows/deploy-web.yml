name: Deploy V2 Web App

on:
  push:
    branches: [main]
    paths:
      - 'v2/web-app/**'
      - 'v2/assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-v2-internal
  cancel-in-progress: false

jobs:
  deploy-v2-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create version.json
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M%S')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "{\"version\":\"$VERSION\",\"buildDate\":\"$(date -Iseconds)\",\"commitSha\":\"$COMMIT_SHA\",\"branch\":\"${GITHUB_REF_NAME}\",\"environment\":\"production\"}" > v2/web-app/version.json
          echo "✅ Created version.json with version: $VERSION"

      - name: Verify PWA files
        run: |
          REQUIRED_FILES="index.html style.css script.js manifest.json sw.js offline.html"
          for file in $REQUIRED_FILES; do
            if [ -f "v2/web-app/$file" ]; then
              echo "✅ v2/web-app/$file exists"
            else
              echo "❌ v2/web-app/$file missing"
              exit 1
            fi
          done

      - name: Upload V2 Web App artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v2/web-app
          name: github-pages-v2-internal

      - name: Deploy V2 Web App to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-v2-internal
