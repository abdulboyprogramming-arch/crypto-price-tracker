name: Deploy Crypto Tracker V2.0

on:
  push:
    branches: [main]
    paths:
      - 'web-app/**'
      - 'browser-extension/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ============================================
  # TEST JOB - Validate code before deployment
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Test HTML files
        run: |
          echo "Testing HTML files..."
          for file in web-app/*.html; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            fi
          done
      
      - name: Test JavaScript files
        run: |
          echo "Testing JavaScript files..."
          if [ -f "web-app/script.js" ]; then
            node -c web-app/script.js
            echo "✓ web-app/script.js syntax valid"
          fi
          if [ -f "browser-extension/background.js" ]; then
            node -c browser-extension/background.js
            echo "✓ browser-extension/background.js syntax valid"
          fi
      
      - name: Test CSS files
        run: |
          echo "Testing CSS files..."
          if [ -f "web-app/style.css" ]; then
            echo "✓ web-app/style.css exists"
          fi
      
      - name: Test manifest files
        run: |
          echo "Testing manifest files..."
          if [ -f "web-app/manifest.json" ]; then
            python -c "import json; json.load(open('web-app/manifest.json'))"
            echo "✓ web-app/manifest.json valid"
          fi
          if [ -f "browser-extension/manifest.json" ]; then
            python -c "import json; json.load(open('browser-extension/manifest.json'))"
            echo "✓ browser-extension/manifest.json valid"
          fi
      
      - name: Test Service Worker
        run: |
          echo "Testing Service Worker..."
          if [ -f "web-app/sw.js" ]; then
            node -c web-app/sw.js
            echo "✓ web-app/sw.js syntax valid"
          fi

  # ============================================
  # BUILD JOB - Prepare deployment artifacts
  # ============================================
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version: $VERSION"
      
      - name: Create version file
        run: |
          echo "{\"version\":\"${{ steps.version.outputs.version }}\",\"buildDate\":\"$(date -Iseconds)\"}" > web-app/version.json
          cat web-app/version.json
      
      - name: Optimize images (if any)
        run: |
          if [ -d "web-app/assets" ]; then
            echo "Optimizing images..."
            # Install imagemin (optional)
            # npm install -g imagemin-cli
            # imagemin web-app/assets/* --out-dir=web-app/assets
          fi
      
      - name: Upload web-app artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-app
          name: github-pages

  # ============================================
  # DEPLOY JOB - Deploy to GitHub Pages
  # ============================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================
  # RELEASE JOB - Create GitHub Release
  # ============================================
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create Release Archive
        run: |
          # Create extension zip
          cd browser-extension
          zip -r ../crypto-tracker-extension-${{ needs.build.outputs.version }}.zip .
          cd ..
          
          # Create web-app zip
          cd web-app
          zip -r ../crypto-tracker-web-${{ needs.build.outputs.version }}.zip .
          cd ..
          
          # Create full source zip
          zip -r crypto-tracker-source-${{ needs.build.outputs.version }}.zip . -x "*.git*" -x "*node_modules*" -x "*.zip"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          body: |
            ## Crypto Tracker Pro v${{ needs.build.outputs.version }}
            
            ### What's New
            - Real-time cryptocurrency prices
            - Multi-platform support (Web, Extension, CLI coming soon)
            - Watchlist and price alerts
            - Dark/Light theme
            - PWA support for mobile install
            - Service worker for offline support
            
            ### Installation
            - **Web App**: [https://abdulboyprogramming-arch.github.io/crypto-price-tracker/](https://abdulboyprogramming-arch.github.io/crypto-price-tracker/)
            - **Browser Extension**: Load unpacked from `browser-extension/` folder
            
            ### Files in this release
            - `crypto-tracker-extension-*.zip` - Browser extension package
            - `crypto-tracker-web-*.zip` - Web application files
            - `crypto-tracker-source-*.zip` - Full source code
          
          files: |
            crypto-tracker-extension-*.zip
            crypto-tracker-web-*.zip
            crypto-tracker-source-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # NOTIFICATION JOB - Send deployment status
  # ============================================
  notify:
    needs: [deploy, release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Status
        run: |
          echo "=========================================="
          echo "  CRYPTO TRACKER PRO - DEPLOYMENT STATUS   "
          echo "=========================================="
          echo "Status: ${{ needs.deploy.result }}"
          echo "URL: ${{ needs.deploy.outputs.page_url }}"
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "=========================================="
