name: Test V2 Components

on:
  pull_request:
    branches: [main]
    paths:
      - 'v2/**'
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  test-web-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test HTML
        run: |
          echo "🔍 Testing V2 Web App HTML..."
          if grep -q '</html>' v2/web-app/index.html; then
            echo "✅ index.html is valid"
          else
            echo "❌ index.html is invalid"
            exit 1
          fi
      
      - name: Test JavaScript syntax
        run: |
          echo "🔍 Testing V2 JavaScript..."
          node -c v2/web-app/script.js && echo "✅ script.js syntax valid"
          node -c v2/web-app/sw.js && echo "✅ sw.js syntax valid"
      
      - name: Test PWA manifest
        run: |
          echo "🔍 Testing PWA manifest..."
          python -c "import json; json.load(open('v2/web-app/manifest.json'))" && echo "✅ manifest.json valid"

  test-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test Extension Manifest
        run: |
          echo "🔍 Testing Extension manifest..."
          python -c "import json; json.load(open('v2/browser-extension/manifest.json'))" && echo "✅ manifest.json valid"
      
      - name: Test Extension JavaScript
        run: |
          echo "🔍 Testing Extension JavaScript..."
          node -c v2/browser-extension/background.js && echo "✅ background.js valid"
          node -c v2/browser-extension/popup.js && echo "✅ popup.js valid"
          node -c v2/browser-extension/options.js && echo "✅ options.js valid"

  test-core-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Test Python syntax
        run: |
          echo "🔍 Testing Core Engine Python..."
          python -m py_compile v2/core-engine/core.py && echo "✅ core.py syntax valid"

  summary:
    needs: [test-web-app, test-extension, test-core-engine]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "=========================================="
          echo "         V2 TEST SUMMARY                  "
          echo "=========================================="
          echo "Web App: ${{ needs.test-web-app.result }}"
          echo "Extension: ${{ needs.test-extension.result }}"
          echo "Core Engine: ${{ needs.test-core-engine.result }}"
          echo "=========================================="
