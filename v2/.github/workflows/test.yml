name: Test V2 Components

on:
  push:
    branches: [main, develop]
    paths:
      - 'v2/**'
  pull_request:
    branches: [main]
    paths:
      - 'v2/**'
  workflow_dispatch:

jobs:
  test-v2-web-app:
    name: Test V2 Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Test HTML structure
        run: |
          echo "🔍 Testing V2 Web App HTML..."
          if grep -q "Crypto Tracker Pro" v2/web-app/index.html; then
            echo "✅ index.html has title"
          else
            echo "❌ index.html missing title"
            exit 1
          fi

      - name: Test JavaScript syntax
        run: |
          echo "🔍 Testing V2 Web App JavaScript..."
          node -c v2/web-app/script.js && echo "✅ script.js syntax valid"
          node -c v2/web-app/sw.js && echo "✅ sw.js syntax valid"

      - name: Test CSS
        run: |
          echo "🔍 Testing V2 Web App CSS..."
          if grep -q "dark" v2/web-app/style.css; then
            echo "✅ Dark theme detected"
          else
            echo "⚠️ Dark theme not found"
          fi

      - name: Test PWA manifest
        run: |
          echo "🔍 Testing PWA manifest..."
          python -c "import json; data=json.load(open('v2/web-app/manifest.json')); assert data['start_url'] == '/web-app/index.html'; assert 'icons' in data"
          echo "✅ PWA manifest is valid"

  test-v2-extension:
    name: Test V2 Browser Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate extension manifest
        run: |
          echo "🔍 Testing Extension manifest..."
          python -c "
import json
with open('v2/browser-extension/manifest.json') as f:
    data = json.load(f)
assert data['manifest_version'] == 3
assert 'permissions' in data
assert 'background' in data
assert 'action' in data
print('✅ Extension manifest is valid')
          "

      - name: Check background script
        run: |
          echo "🔍 Testing background.js..."
          if grep -q "chrome.runtime.onMessage" v2/browser-extension/background.js; then
            echo "✅ Message handling present"
          else
            echo "⚠️ Message handling not found"
          fi

      - name: Check popup script
        run: |
          echo "🔍 Testing popup.js..."
          if grep -q "sendMessage" v2/browser-extension/popup.js; then
            echo "✅ Message sending present"
          else
            echo "⚠️ Message sending not found"
          fi

  test-v2-cli:
    name: Test V2 CLI Tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test Python CLI
        run: |
          if [ -f "v2/cli-tools/python-cli/setup.py" ]; then
            python -c "import ast; ast.parse(open('v2/cli-tools/python-cli/setup.py').read())"
            echo "✅ Python CLI syntax valid"
          else
            echo "⚠️ Python CLI not found (optional)"
          fi

      - name: Test Node.js CLI
        run: |
          if [ -f "v2/cli-tools/node-cli/index.js" ]; then
            node -c v2/cli-tools/node-cli/index.js && echo "✅ Node.js CLI syntax valid"
          else
            echo "⚠️ Node.js CLI not found (optional)"
          fi

  test-v2-api:
    name: Test V2 API Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test API server syntax
        run: |
          if [ -f "v2/api-server/main.py" ]; then
            python -c "import ast; ast.parse(open('v2/api-server/main.py').read())"
            echo "✅ API server syntax valid"
          else
            echo "⚠️ API server not found (optional)"
          fi

  test-v2-summary:
    name: V2 Test Summary
    runs-on: ubuntu-latest
    needs: [test-v2-web-app, test-v2-extension, test-v2-cli, test-v2-api]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "=========================================="
          echo "       V2 COMPONENTS TEST SUMMARY         "
          echo "=========================================="
          echo "Web App:     ${{ needs.test-v2-web-app.result }}"
          echo "Extension:   ${{ needs.test-v2-extension.result }}"
          echo "CLI Tools:   ${{ needs.test-v2-cli.result }}"
          echo "API Server:  ${{ needs.test-v2-api.result }}"
          echo "=========================================="
          
          if [[ "${{ needs.test-v2-web-app.result }}" == "success" ]] && \
             [[ "${{ needs.test-v2-extension.result }}" == "success" ]]; then
            echo "✅ All critical V2 tests passed!"
          else
            echo "❌ Some V2 tests failed. Please review."
            exit 1
          fi
