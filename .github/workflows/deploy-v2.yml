name: Deploy V2 Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'v2/web-app/**'
      - 'v2/assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-v2
  cancel-in-progress: false

jobs:
  deploy-v2:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create version.json
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M%S')
          echo "{\"version\":\"$VERSION\",\"buildDate\":\"$(date -Iseconds)\"}" > v2/web-app/version.json
          echo "✅ Created version.json with version: $VERSION"

      - name: Upload V2 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v2/web-app
          name: github-pages-v2

      - name: Deploy V2 to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-v2
