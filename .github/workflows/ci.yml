name: Continuous Integration

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # LINT JOB - Check all code syntax
  # ============================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check HTML syntax
        run: |
          echo "🔍 Checking HTML files..."
          for file in $(find . -maxdepth 2 -name "*.html" -not -path "./node_modules/*" -not -path "./.git/*" 2>/dev/null); do
            if grep -q "</html>" "$file" 2>/dev/null; then
              echo "✅ $file"
            else
              echo "⚠️ $file may be incomplete"
            fi
          done

      - name: Check CSS syntax
        run: |
          echo "🔍 Checking CSS files..."
          for file in $(find . -maxdepth 2 -name "*.css" -not -path "./node_modules/*" -not -path "./.git/*" 2>/dev/null); do
            if grep -q "{" "$file" 2>/dev/null; then
              echo "✅ $file"
            fi
          done

      - name: Check JavaScript syntax
        run: |
          echo "🔍 Checking JavaScript files..."
          for file in $(find . -maxdepth 2 -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./coverage/*" 2>/dev/null); do
            if node -c "$file" 2>/dev/null; then
              echo "✅ $file"
            else
              echo "❌ $file has syntax errors"
              exit 1
            fi
          done

      - name: Check Python syntax
        run: |
          echo "🔍 Checking Python files..."
          for file in $(find . -maxdepth 2 -name "*.py" -not -path "./.git/*" -not -path "./__pycache__/*" 2>/dev/null); do
            if python -m py_compile "$file" 2>/dev/null; then
              echo "✅ $file"
            else
              echo "❌ $file has syntax errors"
              exit 1
            fi
          done

      - name: Check JSON files
        run: |
          echo "🔍 Checking JSON files..."
          for file in $(find . -maxdepth 2 -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" 2>/dev/null); do
            if python -c "import json; json.load(open('$file'))" 2>/dev/null; then
              echo "✅ $file"
            else
              echo "❌ $file is invalid JSON"
              exit 1
            fi
          done

      - name: Check YAML files
        run: |
          echo "🔍 Checking YAML files..."
          for file in $(find .github -name "*.yml" -o -name "*.yaml" 2>/dev/null); do
            if python -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "✅ $file"
            else
              echo "⚠️ $file YAML validation skipped (pyyaml not installed)"
            fi
          done

  # ============================================
  # TEST WEB APP JOB
  # ============================================
  test-web-app:
    name: Test Web Application
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check web app files
        run: |
          echo "🧪 Testing Web App..."
          REQUIRED_FILES="index.html style.css script.js manifest.json sw.js offline.html"
          for file in $REQUIRED_FILES; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

      - name: Check PWA manifest
        run: |
          echo "🧪 Testing PWA manifest..."
          python -c "import json; data=json.load(open('manifest.json')); assert 'start_url' in data; assert 'icons' in data"
          echo "✅ PWA manifest is valid"

      - name: Check Service Worker
        run: |
          echo "🧪 Testing Service Worker..."
          if grep -q "caches.open" sw.js && grep -q "fetch" sw.js; then
            echo "✅ Service worker has required methods"
          else
            echo "❌ Service worker missing required methods"
            exit 1
          fi

  # ============================================
  # TEST BROWSER EXTENSION JOB
  # ============================================
  test-extension:
    name: Test Browser Extension
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check extension files
        run: |
          echo "🧪 Testing Browser Extension..."
          REQUIRED_FILES="manifest.json background.js popup.html popup.js options.html options.js"
          for file in $REQUIRED_FILES; do
            if [ -f "browser-extension/$file" ]; then
              echo "✅ browser-extension/$file exists"
            else
              echo "❌ browser-extension/$file missing"
              exit 1
            fi
          done

      - name: Validate extension manifest
        run: |
          echo "🧪 Validating extension manifest.json..."
          python -c "
import json
with open('browser-extension/manifest.json') as f:
    data = json.load(f)
assert data['manifest_version'] == 3
assert 'permissions' in data
assert 'background' in data
print('✅ Extension manifest is valid')
          "

      - name: Check background script
        run: |
          echo "🔍 Testing background.js..."
          if grep -q "chrome.runtime.onMessage" browser-extension/background.js; then
            echo "✅ Message handling present"
          else
            echo "⚠️ Message handling not found"
          fi

      - name: Check popup script
        run: |
          echo "🔍 Testing popup.js..."
          if grep -q "sendMessage" browser-extension/popup.js; then
            echo "✅ Message sending present"
          else
            echo "⚠️ Message sending not found"
          fi

      - name: Check options page
        run: |
          echo "🔍 Testing options.html and options.js..."
          if [ -f "browser-extension/options.html" ] && [ -f "browser-extension/options.js" ]; then
            echo "✅ Options page files exist"
          else
            echo "⚠️ Options page missing"
          fi

      - name: Check icons
        run: |
          echo "🔍 Checking icon files..."
          REQUIRED_ICONS="icon16.png icon48.png icon128.png"
          for icon in $REQUIRED_ICONS; do
            if [ -f "browser-extension/icons/$icon" ]; then
              echo "✅ $icon exists"
            else
              echo "⚠️ $icon missing (will be generated by script)"
            fi
          done

  # ============================================
  # TEST CLI TOOLS JOB
  # ============================================
  test-cli:
    name: Test CLI Tools
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test Python CLI
        run: |
          echo "🧪 Testing Python CLI..."
          if [ -f "cli-tools/python-cli/setup.py" ]; then
            cd cli-tools/python-cli
            python -c "import ast; ast.parse(open('setup.py').read())"
            echo "✅ Python CLI setup.py is valid"
          else
            echo "⚠️ Python CLI not found (optional)"
          fi

      - name: Test Node.js CLI
        run: |
          echo "🧪 Testing Node.js CLI..."
          if [ -f "cli-tools/node-cli/package.json" ]; then
            cd cli-tools/node-cli
            node -c index.js 2>/dev/null && echo "✅ Node.js CLI syntax valid"
          else
            echo "⚠️ Node.js CLI not found (optional)"
          fi

  # ============================================
  # TEST API SERVER JOB
  # ============================================
  test-api:
    name: Test API Server
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test API server
        run: |
          echo "🧪 Testing API Server..."
          if [ -f "api-server/main.py" ]; then
            python -c "import ast; ast.parse(open('api-server/main.py').read())"
            echo "✅ API server syntax valid"
          else
            echo "⚠️ API server not found (optional)"
          fi

      - name: Check requirements
        run: |
          if [ -f "api-server/requirements.txt" ]; then
            echo "✅ requirements.txt exists"
          fi

  # ============================================
  # TEST CORE ENGINE JOB
  # ============================================
  test-core-engine:
    name: Test Core Engine
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test core engine
        run: |
          echo "🧪 Testing Core Engine..."
          if [ -f "core-engine/core.py" ]; then
            python -c "import ast; ast.parse(open('core-engine/core.py').read())"
            echo "✅ Core engine syntax valid"
          else
            echo "⚠️ Core engine not found"
          fi

  # ============================================
  # SECURITY SCAN JOB
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for exposed secrets
        run: |
          echo "🔒 Scanning for potential secrets..."
          SECRETS_FOUND=0
          for pattern in "API_KEY=[a-zA-Z0-9]" "SECRET=[a-zA-Z0-9]" "PASSWORD=[a-zA-Z0-9]" "TOKEN=[a-zA-Z0-9]"; do
            if grep -r "$pattern" --include="*.js" --include="*.py" --include="*.html" --exclude-dir=".git" --exclude-dir="node_modules" . 2>/dev/null | grep -v "example\|demo\|test\|placeholder" | grep -q .; then
              echo "⚠️ Potential secret pattern found: $pattern"
              SECRETS_FOUND=1
            fi
          done
          
          if [ $SECRETS_FOUND -eq 0 ]; then
            echo "✅ No obvious secrets found"
          fi

      - name: Check .gitignore coverage
        run: |
          echo "🔍 Checking .gitignore..."
          if grep -q "\.env" .gitignore; then
            echo "✅ .env files are ignored"
          else
            echo "⚠️ .env not in .gitignore"
          fi
          
          if grep -q "\.db" .gitignore; then
            echo "✅ Database files are ignored"
          else
            echo "⚠️ .db not in .gitignore"
          fi

  # ============================================
  # SUMMARY JOB
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-web-app, test-extension, test-cli, test-api, test-core-engine, security]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "=========================================="
          echo "          CI/CD SUMMARY                   "
          echo "=========================================="
          echo "Lint:           ${{ needs.lint.result }}"
          echo "Web App:        ${{ needs.test-web-app.result }}"
          echo "Extension:      ${{ needs.test-extension.result }}"
          echo "CLI Tools:      ${{ needs.test-cli.result }}"
          echo "API Server:     ${{ needs.test-api.result }}"
          echo "Core Engine:    ${{ needs.test-core-engine.result }}"
          echo "Security:       ${{ needs.security.result }}"
          echo "=========================================="
          
          if [[ "${{ needs.lint.result }}" == "success" ]] && \
             [[ "${{ needs.test-web-app.result }}" == "success" ]] && \
             [[ "${{ needs.test-extension.result }}" == "success" ]]; then
            echo "✅ All critical tests passed!"
          else
            echo "❌ Some tests failed. Please review."
            exit 1
          fi
