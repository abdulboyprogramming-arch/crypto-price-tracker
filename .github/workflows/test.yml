name: Test Components

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-web-app:
    name: Test Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Test HTML structure
        run: |
          echo "🔍 Testing Web App HTML..."
          if grep -q "Crypto Tracker Pro" web-app/index.html; then
            echo "✅ index.html has title"
          else
            echo "❌ index.html missing title"
            exit 1
          fi

      - name: Test JavaScript syntax
        run: |
          echo "🔍 Testing Web App JavaScript..."
          node -c web-app/script.js && echo "✅ script.js syntax valid"
          node -c web-app/sw.js && echo "✅ sw.js syntax valid"

      - name: Test CSS
        run: |
          echo "🔍 Testing Web App CSS..."
          if grep -q "dark" web-app/style.css; then
            echo "✅ Dark theme detected"
          else
            echo "⚠️ Dark theme not found"
          fi

      - name: Test PWA manifest
        run: |
          echo "🔍 Testing PWA manifest..."
          python -c "import json; data=json.load(open('web-app/manifest.json')); assert 'start_url' in data; assert 'icons' in data"
          echo "✅ PWA manifest is valid"

  test-extension:
    name: Test Browser Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate extension manifest
        run: |
          echo "🔍 Testing Extension manifest..."
          python -c "
import json
with open('browser-extension/manifest.json') as f:
    data = json.load(f)
assert data['manifest_version'] == 3
assert 'permissions' in data
assert 'background' in data
assert 'action' in data
print('✅ Extension manifest is valid')
          "

      - name: Check background script
        run: |
          echo "🔍 Testing background.js..."
          if grep -q "chrome.runtime.onMessage" browser-extension/background.js; then
            echo "✅ Message handling present"
          else
            echo "⚠️ Message handling not found"
          fi

      - name: Check popup script
        run: |
          echo "🔍 Testing popup.js..."
          if grep -q "sendMessage" browser-extension/popup.js; then
            echo "✅ Message sending present"
          else
            echo "⚠️ Message sending not found"
          fi

  test-cli:
    name: Test CLI Tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test Python CLI
        run: |
          if [ -f "cli-tools/python-cli/setup.py" ]; then
            python -c "import ast; ast.parse(open('cli-tools/python-cli/setup.py').read())"
            echo "✅ Python CLI syntax valid"
          else
            echo "⚠️ Python CLI not found (optional)"
          fi

      - name: Test Node.js CLI
        run: |
          if [ -f "cli-tools/node-cli/index.js" ]; then
            node -c cli-tools/node-cli/index.js && echo "✅ Node.js CLI syntax valid"
          else
            echo "⚠️ Node.js CLI not found (optional)"
          fi

  test-api:
    name: Test API Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test API server syntax
        run: |
          if [ -f "api-server/main.py" ]; then
            python -c "import ast; ast.parse(open('api-server/main.py').read())"
            echo "✅ API server syntax valid"
          else
            echo "⚠️ API server not found (optional)"
          fi

  test-core:
    name: Test Core Engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test core engine syntax
        run: |
          if [ -f "core-engine/core.py" ]; then
            python -c "import ast; ast.parse(open('core-engine/core.py').read())"
            echo "✅ Core engine syntax valid"
          else
            echo "⚠️ Core engine not found"
          fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-web-app, test-extension, test-cli, test-api, test-core]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "=========================================="
          echo "          TEST SUMMARY                    "
          echo "=========================================="
          echo "Web App:     ${{ needs.test-web-app.result }}"
          echo "Extension:   ${{ needs.test-extension.result }}"
          echo "CLI Tools:   ${{ needs.test-cli.result }}"
          echo "API Server:  ${{ needs.test-api.result }}"
          echo "Core Engine: ${{ needs.test-core.result }}"
          echo "=========================================="
          
          if [[ "${{ needs.test-web-app.result }}" == "success" ]] && \
             [[ "${{ needs.test-extension.result }}" == "success" ]]; then
            echo "✅ All critical tests passed!"
          else
            echo "❌ Some tests failed. Please review."
            exit 1
          fi