name: Deploy V1 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'v1/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-v1
  cancel-in-progress: false

jobs:
  deploy-v1:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload V1 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v1
          name: github-pages-v1

      - name: Deploy V1 to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-v1
