name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0, v2.0.0)'
        required: true
        type: string
        default: 'v1.0.0'
      pre_release:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
            # Create tag if it doesn't exist
            if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
              git tag "$VERSION"
              git push origin "$VERSION"
              echo "✅ Created tag: $VERSION"
            fi
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          # Remove 'v' prefix for display
          DISPLAY_VERSION="${VERSION#v}"
          echo "version=$DISPLAY_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$DISPLAY_VERSION"

      - name: Generate Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag }}"
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          
          cat > RELEASE_NOTES.md << EOF
          # 🚀 Crypto Tracker Pro v$VERSION

          ## ✨ What's New in This Release

          $(git log -1 --pretty=%B)

          ## 📦 Installation

          ### Web App (PWA)
          - Visit: https://${OWNER}.github.io/${REPO_NAME}/
          - Install on mobile: Chrome → Add to Home Screen

          ### Browser Extension
          1. Download \`crypto-tracker-extension-$VERSION.zip\`
          2. Extract the zip file
          3. Chrome: \`chrome://extensions/\` → Load unpacked
          4. Firefox: \`about:debugging\` → Load Temporary Add-on

          ### Python CLI
          \`\`\`bash
          pip install crypto-tracker-cli
          crypto-tracker top
          \`\`\`

          ### Node.js CLI
          \`\`\`bash
          npm install -g crypto-tracker-cli
          crypto-tracker top
          \`\`\`

          ### API Server
          \`\`\`bash
          git clone https://github.com/${OWNER}/${REPO_NAME}.git
          cd ${REPO_NAME}/api-server
          pip install -r requirements.txt
          python main.py
          \`\`\`

          ## 🔗 Links
          - [Web App Demo](https://${OWNER}.github.io/${REPO_NAME}/)
          - [GitHub Repository](https://github.com/${OWNER}/${REPO_NAME})
          - [Report Issues](https://github.com/${OWNER}/${REPO_NAME}/issues)

          ## 📋 Full Changelog
          $(git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD)..HEAD | sed 's/^/- /')
          EOF

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Crypto Tracker Pro v${{ steps.get_version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
          tag_name: ${{ steps.get_version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-assets:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow for icons
        run: |
          pip install Pillow

      - name: Generate icons
        run: |
          if [ -f "scripts/generate-icons.py" ]; then
            python scripts/generate-icons.py || echo "Icon generation skipped"
          fi

      - name: Create Web App Archive
        run: |
          zip -r crypto-tracker-web-v${{ needs.create-release.outputs.version }}.zip . \
            -x "*.git*" \
            -x "*node_modules*" \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "browser-extension/*" \
            -x "cli-tools/*" \
            -x "api-server/*" \
            -x "core-engine/*" \
            -x "docker/*" \
            -x "scripts/*" \
            -x ".github/*" \
            -x "*.zip"
          echo "✅ Created web app archive"

      - name: Create Browser Extension Archive
        run: |
          cd browser-extension
          zip -r ../crypto-tracker-extension-v${{ needs.create-release.outputs.version }}.zip .
          cd ..
          echo "✅ Created extension archive"

      - name: Create Python CLI Archive
        run: |
          if [ -d "cli-tools/python-cli" ]; then
            cd cli-tools/python-cli
            zip -r ../../crypto-tracker-python-cli-v${{ needs.create-release.outputs.version }}.zip .
            cd ../..
            echo "✅ Created Python CLI archive"
          fi

      - name: Create Node.js CLI Archive
        run: |
          if [ -d "cli-tools/node-cli" ]; then
            cd cli-tools/node-cli
            zip -r ../../crypto-tracker-node-cli-v${{ needs.create-release.outputs.version }}.zip . -x "node_modules/*"
            cd ../..
            echo "✅ Created Node.js CLI archive"
          fi

      - name: Create API Server Archive
        run: |
          if [ -d "api-server" ]; then
            cd api-server
            zip -r ../crypto-tracker-api-v${{ needs.create-release.outputs.version }}.zip .
            cd ..
            echo "✅ Created API archive"
          fi

      - name: Create Core Engine Archive
        run: |
          if [ -d "core-engine" ]; then
            cd core-engine
            zip -r ../crypto-tracker-core-v${{ needs.create-release.outputs.version }}.zip .
            cd ..
            echo "✅ Created core engine archive"
          fi

      - name: Create Full Source Archive
        run: |
          zip -r crypto-tracker-source-v${{ needs.create-release.outputs.version }}.zip . \
            -x "*.git*" \
            -x "*node_modules*" \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "*.zip" \
            -x ".github/workflows/*.yml"
          echo "✅ Created full source archive"

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: |
            crypto-tracker-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Release Complete
    runs-on: ubuntu-latest
    needs: [create-release, build-assets]
    if: always()
    steps:
      - name: Print Completion
        run: |
          echo "=========================================="
          echo "        RELEASE COMPLETED                  "
          echo "=========================================="
          echo "Version: v${{ needs.create-release.outputs.version }}"
          echo "Status: ${{ needs.build-assets.result }}"
          echo "=========================================="
          echo ""
          echo "📦 Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"