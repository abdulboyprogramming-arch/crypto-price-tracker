name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'style.css'
      - 'script.js'
      - 'manifest.json'
      - 'sw.js'
      - 'offline.html'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create version.json
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M%S')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "{\"version\":\"$VERSION\",\"buildDate\":\"$(date -Iseconds)\",\"commitSha\":\"$COMMIT_SHA\",\"branch\":\"${GITHUB_REF_NAME}\",\"environment\":\"production\"}" > version.json
          echo "✅ Created version.json with version: $VERSION"

      - name: Verify PWA files
        run: |
          REQUIRED_FILES="index.html style.css script.js manifest.json sw.js offline.html"
          for file in $REQUIRED_FILES; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
